name: Update portal stats

on:
  schedule:
    - cron: "10 21 * * *"  # 毎日 06:10 JST
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: update-stats
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Fetch stats
        run: python fetch_stats.py
      - name: Commit if changed
        run: |
          if git diff --quiet -- stats.json; then
            echo "no change"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add stats.json
          git commit -m "chore: 統計を自動更新 (stats.json)"
          git push
