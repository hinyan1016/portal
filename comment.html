<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<meta name="googlebot" content="noindex,nofollow">
<title>監修者からのコメント｜医知創造ラボ</title>
<style>
:root{--navy:#1B3A5C;--blue:#2C5AA0;--ink:#222;--muted:#5A6B7E;--line:#dee2e6}
html,body{margin:0;padding:0;background:#F4F6F8}
body{font-family:'BIZ UDPGothic','Yu Gothic',Meiryo,'Noto Sans JP',sans-serif;color:var(--ink);line-height:1.9}
.page{max-width:760px;margin:0 auto;padding:40px 20px 64px}
.back{display:inline-block;margin-bottom:20px;font-size:14px;color:var(--blue);text-decoration:none;font-weight:700}
.back:hover{text-decoration:underline}
.card{background:#fff;border:1px solid var(--line);border-left:4px solid var(--blue);border-radius:8px;padding:24px 26px;box-shadow:0 2px 8px rgba(27,58,92,.10)}
.card h3{font-size:18px;font-weight:700;color:var(--navy);margin:0 0 4px}
.card .by{font-size:13px;color:var(--muted);margin-bottom:14px}
.card p{margin:0 0 12px;font-size:15px}
.card p:last-child{margin-bottom:0}
.card a{color:var(--blue)}
@media(max-width:720px){.card{padding:18px 18px}.page{padding:24px 16px 48px}}
</style>
</head>
<body>
<div class="page">
<a class="back" href="./">← 医知創造ラボ トップへ戻る</a>
<!-- ▼▼▼ ここから下の <div class="card"> の中を自由に編集してください（このファイルを保存してpushすれば即反映） ▼▼▼ -->
<div class="card">
  <h3>監修者からのひとこと</h3>
  <div class="by">今村 久司（脳神経内科 専門医）</div>
  <p>最新AIを用いて医学情報を整理し発信する今村久司の自己満足のページにわざわざご足労いただき、感謝いたします。今後も、色々なことに挑戦していきたいです。</p>
</div>

</div>
</body>
</html>
