<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex,nofollow,noarchive">
<meta name="googlebot" content="noindex,nofollow">
<title>監修者からのコメント</title>
<style>
:root{--navy:#15324E;--coral:#E0744E;--ink:#1B2A38;--muted:#5C6B78;--line:#E5EAF0;--serif:"Hiragino Mincho ProN","Yu Mincho",YuMincho,"MS PMincho",serif}
html,body{margin:0;padding:0;background:transparent}
body{font-family:"Yu Gothic","游ゴシック","Hiragino Kaku Gothic ProN","Segoe UI",sans-serif;color:var(--ink);line-height:1.9}
.card{background:#fff;border:1px solid var(--line);border-left:5px solid var(--coral);border-radius:14px;padding:24px 26px;box-shadow:0 1px 2px rgba(21,50,78,.05),0 8px 26px rgba(21,50,78,.07)}
.card h3{font-family:var(--serif);font-size:18px;font-weight:600;color:var(--navy);margin:0 0 4px}
.card .by{font-size:13px;color:var(--muted);margin-bottom:14px}
.card p{margin:0 0 12px;font-size:15px}
.card p:last-child{margin-bottom:0}
.card a{color:#2C6CA8}
@media(max-width:720px){.card{padding:18px 18px}}
</style>
</head>
<body>
<!-- ▼▼▼ ここから下の <div class="card"> の中を自由に編集してください（このファイルを保存してpushすれば即反映） ▼▼▼ -->
<div class="card">
  <h3>監修者からのひとこと</h3>
  <div class="by">今村 久司（脳神経内科 専門医）</div>
  <p>最新AIを用いて医学情報を整理し発信する今村久司の自己満足のページにわざわざご足労いただき、感謝いたします。今後も、色々なことに挑戦していきたいです。</p>
</div>
<!-- ▲▲▲ 編集はここまで ▲▲▲ -->
</body>
</html>
